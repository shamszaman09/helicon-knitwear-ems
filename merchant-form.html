<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Helicon EMS - Merchandiser Portal</title>
  <style>
    body { background-color: #0b0f19; color: #f3f4f6; font-family: sans-serif; padding: 40px 20px; }
    .container { max-width: 550px; margin: 0 auto; background: #111827; border: 1px solid #1f2937; border-radius: 6px; padding: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    h2 { margin-top: 0; color: #fff; border-bottom: 1px solid #1f2937; padding-bottom: 10px; }
    label { display: block; font-size: 11px; color: #9ca3af; margin: 15px 0 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    input { width: 100%; padding: 10px; background: #1f2937; border: 1px solid #374151; border-radius: 4px; color: #fff; box-sizing: border-box; }
    input:focus { outline: none; border-color: #2563eb; }
    button { width: 100%; margin-top: 25px; padding: 12px; background: #2563eb; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px; }
    button:hover { background: #1d4ed8; }
    .msg { font-size: 14px; text-align: center; margin-top: 15px; display: none; color: #10b981; font-weight: bold; }
    .nav-links { display: flex; justify-content: space-between; margin-top: 20px; font-size: 13px; border-top: 1px solid #1f2937; padding-top: 15px; }
    a { color: #3b82f6; text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="container">
    <h2>💼 Merchandiser Style Entry Form</h2>
    <form id="intake-form">
      <label>Buyer Name</label>
      <input type="text" id="buyer" required placeholder="e.g., Zara, H&M, Hugo Boss">

      <label>Style Reference ID (Unique)</label>
      <input type="text" id="style" required placeholder="e.g., ZR-99-K">

      <label>Issued / Log Date</label>
      <input type="date" id="issued_log_date" required>

      <label>Required Date (Agreed by Sample Manager)</label>
      <input type="date" id="required_date_agreed_by_sample_manager" required>

      <label>Pcs Required (Order Quantity)</label>
      <input type="number" id="pcs_required" required min="1" placeholder="e.g., 5000">

      <label>Committed Date for Yarn</label>
      <input type="date" id="committed_date_for_yarn" required>

      <label>Committed Date for Accessories</label>
      <input type="date" id="committed_date_for_accessories" required>

      <button type="submit">Deploy Master Record to Pipeline</button>
      <div id="status-msg" class="msg">Master style record logged successfully!</div>
    </form>

    <div class="nav-links">
      <a href="/dashboard.html">🖥️ View Production Dashboard</a>
      <a href="/index.html">🚪 Exit Terminal</a>
    </div>
  </div>

  <script>
    // Security check - redirect if token is missing
    if (!localStorage.getItem('helicon_token')) {
      window.location.href = '/index.html';
    }

    document.getElementById('intake-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('status-msg');
      msg.style.display = 'none';

      // Maps field IDs directly to your updated server columns
      const payload = {
        buyer: document.getElementById('buyer').value,
        style: document.getElementById('style').value,
        issued_log_date: document.getElementById('issued_log_date').value,
        required_date_agreed_by_sample_manager: document.getElementById('required_date_agreed_by_sample_manager').value,
        pcs_required: parseInt(document.getElementById('pcs_required').value, 10),
        committed_date_for_yarn: document.getElementById('committed_date_for_yarn').value,
        committed_date_for_accessories: document.getElementById('committed_date_for_accessories').value
      };

      try {
        const response = await fetch('/api/factory/intake', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.ok && data.success) {
          msg.style.display = 'block';
          document.getElementById('intake-form').reset();
        } else {
          alert('Submission failed: ' + (data.error || 'Check for duplicate Style IDs.'));
        }
      } catch (err) {
        console.error(err);
        alert('Network communication error.');
      }
    });
  </script>
</body>
</html>
